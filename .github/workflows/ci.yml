name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate resource catalog and JSON schema
        run: python scripts/validate_resource_catalog.py --require-jsonschema

      - name: Generate resource views
        run: python scripts/generate_resource_views.py

      - name: Validate repository contracts
        run: python scripts/validate_repo_contracts.py --require-jsonschema

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Check markdown links format
        run: python scripts/check_links.py

      - name: Validate normalization seed
        run: python scripts/validate_normalization.py data/processed/normalization_seed_v0.1.tsv

      - name: Run tests
        run: python -m pytest -q
