name: Resource Sync

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Candidate fetch limit per source"
        required: false
        default: "20"
      max_promotions:
        description: "Optional max number of candidate promotions"
        required: false
        default: ""
      enforce_pashto_relevance:
        description: "Also remove existing entries without Pashto evidence"
        required: false
        default: "true"

concurrency:
  group: resource-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  RESOURCE_LIMIT: ${{ github.event.inputs.limit || '20' }}
  MAX_PROMOTIONS: ${{ github.event.inputs.max_promotions || '' }}
  ENFORCE_PASHTO_RELEVANCE: ${{ github.event.inputs.enforce_pashto_relevance || 'true' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Review existing resources for stale or low-value entries
        run: |
          if [ "${ENFORCE_PASHTO_RELEVANCE}" = "true" ]; then
            python scripts/review_existing_resources.py --enforce-pashto-relevance
          else
            python scripts/review_existing_resources.py
          fi

      - name: Sync candidate resources
        run: python scripts/sync_resources.py --limit "${RESOURCE_LIMIT}"

      - name: Auto-promote valid candidates
        run: |
          if [ -n "${MAX_PROMOTIONS}" ]; then
            python scripts/promote_candidates.py --max-promotions "${MAX_PROMOTIONS}"
          else
            python scripts/promote_candidates.py
          fi

      - name: Validate catalog
        run: python scripts/validate_resource_catalog.py --require-jsonschema

      - name: Generate resource views
        run: python scripts/generate_resource_views.py

      - name: Validate repository contracts
        run: python scripts/validate_repo_contracts.py --require-jsonschema

      - name: Audit resource pipeline
        run: python scripts/audit_resource_pipeline.py --output .resource_audit.json

      - name: Build review summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path("resources/catalog/resources.json").read_text(encoding="utf-8"))
          pending = json.loads(Path("resources/catalog/pending_candidates.json").read_text(encoding="utf-8"))
          technical = json.loads(Path("docs/search/resources.json").read_text(encoding="utf-8"))
          papers = json.loads(Path("docs/papers/resources.json").read_text(encoding="utf-8"))
          audit = json.loads(Path(".resource_audit.json").read_text(encoding="utf-8"))

          source_errors = pending.get("errors", [])
          prior_removals = pending.get("skipped_prior_removals", [])
          warning_lines = []
          if source_errors:
              warning_lines.append(f"- Source errors: {len(source_errors)}")
          if prior_removals:
              warning_lines.append(f"- Skipped prior hard removals: {len(prior_removals)}")
          if not warning_lines:
              warning_lines.append("- No source errors or prior-removal skips recorded")

          body = "\n".join(
              [
                  "Automated daily resource sync.",
                  "",
                  "Summary",
                  f"- Catalog resources: {len(catalog.get('resources', []))}",
                  f"- Pending candidates: {pending.get('candidate_count', 0)}",
                  f"- Technical search rows: {technical.get('count', 0)}",
                  f"- Papers search rows: {papers.get('count', 0)}",
                  "",
                  "Pipeline audit",
                  f"- Candidate-like verified rows: {len(audit.get('candidate_like_verified', []))}",
                  f"- Metadata-only verified rows: {len(audit.get('metadata_only_verified', []))}",
                  f"- Duplicate title groups: {len(audit.get('duplicate_title_groups', []))}",
                  f"- DataCite project collisions: {len(audit.get('datacite_project_collisions', []))}",
                  "",
                  "Warnings",
                  *warning_lines,
                  "",
                  "Review checklist",
                  "- Confirm high-confidence auto-promotions look correct",
                  "- Review any pending candidates left for manual enrichment",
                  "- Assign a review owner and backup reviewer before merge if this change is part of a release",
              ]
          )
          Path(".resource_sync_pr_body.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: "resource-update", color: "0e8a16", description: "Automated resource catalog updates" },
              { name: "needs-review", color: "fbca04", description: "Needs maintainer review before merge" }
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Create review PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/resource-sync
          delete-branch: true
          commit-message: "chore(resources): sync candidate feed and auto-promote valid entries"
          title: "chore(resources): sync and auto-promote Pashto resources"
          body-path: .resource_sync_pr_body.md
          labels: |
            resource-update
            needs-review
          add-paths: |
            resources/catalog/pending_candidates.json
            resources/catalog/resources.json
            resources/catalog/removal_log.json
            resources/README.md
            resources/datasets/README.md
            resources/models/README.md
            resources/benchmarks/README.md
            resources/tools/README.md
            resources/papers/README.md
            resources/projects/README.md
            resources/codes/README.md
            docs/search/resources.json
            docs/papers/resources.json
